# qBiremo Enhanced Configuration Example
# Copy/rename to: qbiremo_enhanced_config.toml

# qBittorrent Connection Settings
#
# qb_host can be a plain hostname/IP or a full URL with scheme:
#   qb_host = "127.0.0.1"
#   qb_host = "https://qb.example.com:443"
#   qb_host = "https://httpuser:httppass@qb.example.com:443"
#
#
#   https://qbittorrent-api.readthedocs.io/en/latest/apidoc/client.html
#   host (str) – hostname for qBittorrent Web API, [http[s]://]hostname[:port][/path]
#   port (str | int | None) – port number for qBittorrent Web API (ignored if host contains a port)
#
#
# HTTP Basic Auth (for HTTPS/reverse proxy layer, NOT qBittorrent API auth)
# can be embedded in the qb_host URL above, or set separately:
# http_basic_auth_username = ""
# http_basic_auth_password = ""
#
# qBittorrent API auth (qb_username/qb_password below) is separate from HTTP basic auth.

qb_host = "127.0.0.1"
qb_port = 8080
qb_username = "admin"
qb_password = "CHANGE_ME"

# Optional protocol scheme for qBittorrent WebUI/API.
# Allowed values: "http" or "https" (default: "http")
http_protocol_scheme = "http"

# Optional HTTP timeout for qBittorrent API requests, in seconds.
# Default: 300
http_timeout = 300

# Optional title-bar speed format
# Placeholders: {down_text}, {up_text}
title_bar_speed_format = "[D: {down_text}, U: {up_text}]"
# Example (old style): f"U:{up_text} D:{down_text}"
# title_bar_speed_format = "U:{up_text} D:{down_text}"

# Optional logging target
# log_file = "qbiremo_enhanced.log"
