# qBiremo Enhanced configuration example
# Copy to: qbiremo_enhanced_config.toml
#
# This file is synchronized with validate_and_normalize_config() contracts.
# If a key is missing or invalid, the app applies the documented defaults below.

# -----------------------------------------------------------------------------
# qBittorrent API connection
# -----------------------------------------------------------------------------
#
# Type: string
# Default (missing/invalid): "localhost"
# Allowed:
# - Plain host/IP: "127.0.0.1", "qb.example.com"
# - Full URL: "http://qb.example.com:8080", "https://qb.example.com:443"
# - URL with HTTP basic auth: "https://httpuser:httppass@qb.example.com:443"
qb_host = "127.0.0.1"

# Type: integer
# Default (missing/invalid): 8080
# Allowed range: 1..65535
qb_port = 8080

# Type: string
# Default (missing/invalid): "admin"
qb_username = "admin"

# Type: string
# Default (missing/invalid): ""
qb_password = "CHANGE_ME"

# -----------------------------------------------------------------------------
# Optional reverse-proxy / HTTP basic auth (separate from qb_username/password)
# -----------------------------------------------------------------------------
#
# Type: string
# Default: ""
# Notes:
# - If qb_host contains URL userinfo (user:pass@...), embedded values win.
# - If still empty, environment fallback is used: X_HTTP_USER / X_HTTP_PASS.
http_basic_auth_username = ""
http_basic_auth_password = ""

# -----------------------------------------------------------------------------
# Protocol and timeout
# -----------------------------------------------------------------------------
#
# Type: string
# Effective default: "http"
# Allowed: "http", "https"
http_protocol_scheme = "http"

# Type: integer (seconds)
# Default (missing/invalid/non-positive): 300
http_timeout = 300

# -----------------------------------------------------------------------------
# UI title format
# -----------------------------------------------------------------------------
#
# Type: string
# Default (missing/invalid): "[D: {down_text}, U: {up_text}]"
# Must format with placeholders: {down_text}, {up_text}
title_bar_speed_format = "[D: {down_text}, U: {up_text}]"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
#
# Type: string
# Default (missing/invalid): "qbiremo_enhanced.log"
# Relative or absolute path.
log_file = "qbiremo_enhanced.log"

# -----------------------------------------------------------------------------
# Legacy keys (still accepted with deprecation warning)
# -----------------------------------------------------------------------------
# host = "127.0.0.1"
# port = 8080
# username = "admin"
# password = "CHANGE_ME"
# http_user = ""
# http_password = ""

# -----------------------------------------------------------------------------
# Runtime-only keys (do not set manually; managed by the app)
# -----------------------------------------------------------------------------
# _config_file_path
# _log_file_path
# _instance_id
# _instance_counter
# _instance_lock_file_path

# -----------------------------------------------------------------------------
# QSettings-managed keys ignored in TOML (warning if present)
# -----------------------------------------------------------------------------
# auto_refresh
# refresh_interval
# default_window_width
# default_window_height
# default_status_filter
# display_size_mode
# display_speed_mode
