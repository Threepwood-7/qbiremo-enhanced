minimum_pre_commit_version: "4.5.1"

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff
        entry: python -m ruff check qbiremo_enhanced tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format-check
        name: ruff-format
        entry: python -m ruff format --check qbiremo_enhanced tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: >-
          python -m pytest -q --cov=qbiremo_enhanced --cov-report=term-missing
          --cov-report=xml
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pyright-advisory
        name: pyright-advisory
        entry: python -m pyright
        language: system
        pass_filenames: false
        stages: [manual]
