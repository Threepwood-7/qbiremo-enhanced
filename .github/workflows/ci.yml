name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  quality:
    name: Lint, Mypy, and Tests
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (Qt/PySide6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff Lint
        run: python -m ruff check qbiremo_enhanced tests

      - name: Ruff Format Check
        run: python -m ruff format --check qbiremo_enhanced tests

      - name: Mypy
        run: python -m mypy

      - name: Pytest
        run: >-
          python -m pytest -q --cov=qbiremo_enhanced --cov-report=term-missing
          --cov-report=xml

  pyright_advisory:
    name: Pyright Advisory (Non-blocking)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (Qt/PySide6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Pyright (advisory)
        run: python -m pyright || true
