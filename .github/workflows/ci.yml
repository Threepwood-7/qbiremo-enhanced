name: CI

on:
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Types
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install Hatch
        run: uv tool install hatch

      - name: Run linting
        run: hatch run lint:check

      - name: Run formatting check
        run: hatch run lint:fmt

      - name: Run type checking
        run: hatch run lint:types

      - name: Run dependency checks
        run: hatch run lint:deps

      - name: Advisory dead code checks
        run: hatch run lint:deadcode
        continue-on-error: true

      - name: Advisory complexity checks
        run: hatch run lint:complexity
        continue-on-error: true

      - name: Run policy checks
        run: hatch run lint:policy

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Hatch
        run: uv tool install hatch

      - name: Run tests with coverage
        run: hatch run test-cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: ${{ matrix.python-version == '3.13' }}
        with:
          files: coverage.xml
          fail_ci_if_error: false
